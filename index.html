<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Team Planner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&display=swap');

  :root {
    --bg: #1a1a1a;
    --panel: #222;
    --card-bg: #d8d0c4;
    --header-bg: #111;
    --orange: #e5541b;
    --text-dark: #1a1a1a;
    --text-light: #e8e0d4;
    --muted: #777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto Condensed', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-light);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #111;
    border-bottom: 3px solid var(--orange);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--orange);
  }

  .reset-btn {
    padding: 5px 12px;
    border: 2px solid var(--orange);
    background: transparent;
    color: var(--orange);
    font-family: 'Oswald', sans-serif;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .reset-btn:hover { background: var(--orange); color: #fff; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* --- Team Panels (left & right) --- */
  .team-panel {
    flex: 1;
    background: var(--panel);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .team-panel.left { border-right: 2px solid #333; }
  .team-panel.right { border-left: 2px solid #333; }

  .team-header {
    background: #111;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    border-bottom: 2px solid #444;
    position: sticky;
    top: 0;
    z-index: 4;
  }

  .team-select {
    flex: 1;
    padding: 5px 8px;
    border-radius: 3px;
    border: 2px solid #444;
    background: #2a2a2a;
    color: var(--text-light);
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    min-width: 0;
  }

  .team-select:focus { outline: 2px solid var(--orange); border-color: var(--orange); }

  .turn-labels {
    display: flex;
    align-items: center;
    background: #181818;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    position: sticky;
    top: 38px;
    z-index: 3;
  }

  .turn-labels .spacer {
    flex: 1;
    padding: 4px 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .turn-labels .turn-label {
    width: 32px;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 0;
    border-left: 1px solid #333;
    letter-spacing: 0.5px;
  }

  .turn-labels .turn-label:nth-child(2) { color: #4ade80; }
  .turn-labels .turn-label:nth-child(3) { color: #60a5fa; }
  .turn-labels .turn-label:nth-child(4) { color: #c084fc; }
  .turn-labels .turn-label:nth-child(5) { color: #fb923c; }

  /* Mirrored: right panel has checkboxes on left side */
  .team-panel.right .turn-labels { flex-direction: row-reverse; }
  .team-panel.right .turn-labels .turn-label { border-left: none; border-right: 1px solid #333; }
  .team-panel.right .item { flex-direction: row-reverse; }
  .team-panel.right .item-turns { flex-direction: row-reverse; }
  .team-panel.right .turn-check { border-left: none; border-right: 1px solid #333; }

  .team-content { flex: 1; overflow-y: auto; }

  .section-header {
    background: #111;
    padding: 6px 12px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--orange);
    border-bottom: 2px solid var(--orange);
    border-top: 1px solid #333;
    position: sticky;
    top: 0;
    z-index: 2;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .section-header .chevron {
    transition: transform 0.2s;
    font-size: 0.6rem;
  }

  .section-header.collapsed .chevron { transform: rotate(-90deg); }
  .section-body { overflow: hidden; }
  .section-header.collapsed + .section-body { display: none; }

  .item {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid #333;
    background: var(--panel);
    transition: background 0.15s;
  }

  .item:hover { background: #2a2a2a; }
  .item.removed { display: none; }

  .item-info {
    flex: 1;
    padding: 6px 10px;
    cursor: pointer;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .item-info-text { flex: 1; min-width: 0; }

  .item-title {
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-light);
    margin-bottom: 0;
  }

  .item-type {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }

  .item-detail {
    display: none;
    margin-top: 6px;
    padding: 6px;
    background: var(--card-bg);
    border-radius: 3px;
    border-left: 3px solid var(--orange);
    font-size: 0.7rem;
    line-height: 1.4;
    white-space: pre-wrap;
    color: var(--text-dark);
    max-height: 200px;
    overflow-y: auto;
    font-family: 'Roboto Condensed', sans-serif;
  }

  .item.expanded .item-detail { display: block; }

  .remove-btn {
    background: none;
    border: none;
    color: #666;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .remove-btn:hover { color: #ef4444; }

  .item-turns {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .turn-check {
    width: 32px;
    height: 100%;
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 1px solid #333;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
    position: relative;
  }

  .turn-check::after {
    content: '';
    width: 14px;
    height: 14px;
    border: 2px solid #555;
    border-radius: 2px;
    display: block;
    transition: all 0.15s;
  }

  .turn-check:hover::after { border-color: var(--orange); }

  .turn-check.active::before {
    content: '\2713';
    position: absolute;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    z-index: 1;
    pointer-events: none;
  }

  .turn-check[data-turn="1"].active { background: rgba(74, 222, 128, 0.1); }
  .turn-check[data-turn="1"].active::after { background: #4ade80; border-color: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.3); }
  .turn-check[data-turn="1"]:hover::after { border-color: #4ade80; }

  .turn-check[data-turn="2"].active { background: rgba(96, 165, 250, 0.1); }
  .turn-check[data-turn="2"].active::after { background: #60a5fa; border-color: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.3); }
  .turn-check[data-turn="2"]:hover::after { border-color: #60a5fa; }

  .turn-check[data-turn="3"].active { background: rgba(192, 132, 252, 0.1); }
  .turn-check[data-turn="3"].active::after { background: #c084fc; border-color: #c084fc; box-shadow: 0 0 6px rgba(192,132,252,0.3); }
  .turn-check[data-turn="3"]:hover::after { border-color: #c084fc; }

  .turn-check[data-turn="4"].active { background: rgba(251, 146, 60, 0.1); }
  .turn-check[data-turn="4"].active::after { background: #fb923c; border-color: #fb923c; box-shadow: 0 0 6px rgba(251,146,60,0.3); }
  .turn-check[data-turn="4"]:hover::after { border-color: #fb923c; }

  /* --- Center Scoring Panel --- */
  .scoring-panel {
    width: 200px;
    min-width: 180px;
    flex-shrink: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    border-left: 2px solid #333;
    border-right: 2px solid #333;
  }

  .scoring-header {
    background: #111;
    padding: 8px 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--orange);
    border-bottom: 3px solid var(--orange);
    text-align: center;
    flex-shrink: 0;
  }

  .scoring-list {
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
  }

  .score-item {
    background: #262626;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .score-item-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-light);
    text-align: center;
  }

  .score-inputs {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .score-input {
    width: 50px;
    padding: 5px 3px;
    text-align: center;
    border: 2px solid #555;
    border-radius: 3px;
    background: #1a1a1a;
    color: var(--orange);
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    -moz-appearance: textfield;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .score-input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 6px rgba(229,84,27,0.3); }

  select.score-input { padding: 5px 2px; text-align-last: center; }
  select.score-input option { background: #1a1a1a; color: var(--orange); }

  .primary-radio {
    width: 14px;
    height: 14px;
    cursor: pointer;
    accent-color: var(--orange);
    flex-shrink: 0;
    margin: 0;
  }

  .score-item.has-radio .score-item-label {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
  }

  .primary-value {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--orange);
    text-align: center;
    min-width: 20px;
  }

  .total-vp {
    background: #333;
    border: 2px solid #555;
    border-radius: 3px;
    padding: 8px 10px;
    text-align: center;
  }

  .total-vp-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #fff;
    margin-bottom: 4px;
  }

  .total-vp-values {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .total-vp-num {
    font-family: 'Oswald', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    min-width: 30px;
  }

  .empty-hint {
    color: #555;
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    text-align: center;
    padding: 16px 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #666; }

  /* --- Mobile: stacked tabs --- */
  @media (max-width: 900px) {
    .main { flex-direction: column; overflow-y: auto; }

    .team-panel {
      flex: none;
      min-height: 0;
      max-height: none;
      overflow-y: visible;
      border: none !important;
    }

    .team-panel.right .turn-labels { flex-direction: row; }
    .team-panel.right .turn-labels .turn-label { border-left: 1px solid #333; border-right: none; }
    .team-panel.right .item { flex-direction: row; }
    .team-panel.right .item-turns { flex-direction: row; }
    .team-panel.right .turn-check { border-left: 1px solid #333; border-right: none; }

    .team-content { overflow-y: visible; }

    .scoring-panel {
      width: 100%;
      min-width: unset;
      flex-shrink: 0;
      border: none;
      border-top: 2px solid var(--orange);
      border-bottom: 2px solid var(--orange);
    }

    .scoring-list {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      padding: 8px;
      gap: 6px;
    }

    .score-item {
      flex: 1 1 auto;
      min-width: 80px;
      max-width: 120px;
      padding: 6px 8px;
    }

    .score-item-label { font-size: 0.6rem; }
    .score-input { width: 40px; font-size: 1rem; padding: 4px 2px; }
    .score-inputs { gap: 4px; }
    .primary-value { font-size: 1rem; }
    .total-vp { padding: 6px 8px; }
    .total-vp-label { font-size: 0.6rem; }
    .total-vp-num { font-size: 1.1rem; }
    .primary-radio { width: 12px; height: 12px; }

    header { padding: 6px 12px; gap: 10px; }
    header h1 { font-size: 1rem; letter-spacing: 2px; }

    .team-header { position: sticky; top: 0; z-index: 5; }
    .turn-labels { position: sticky; z-index: 4; top: 34px; }
    .section-header { position: relative; }

    .turn-check { width: 28px; min-height: 30px; }
    .turn-check::after { width: 12px; height: 12px; }
    .turn-check.active::before { font-size: 0.55rem; }
    .turn-labels .turn-label { width: 28px; font-size: 0.55rem; }
    .item-title { font-size: 0.7rem; }
    .item-type { font-size: 0.55rem; }
    .item-info { padding: 5px 8px; }
    .item-detail { font-size: 0.65rem; max-height: 180px; }
  }

  @media (max-width: 480px) {
    header h1 { font-size: 0.85rem; letter-spacing: 1px; }
    .team-select { font-size: 0.7rem; padding: 4px 6px; }
    .score-item { min-width: 60px; padding: 4px 6px; }
    .score-item-label { font-size: 0.55rem; letter-spacing: 1px; }
    .score-input { width: 36px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Kill Team Planner</h1>
  <button class="reset-btn" id="resetBtn">Clear All</button>
</header>

<div class="main">
  <!-- LEFT TEAM -->
  <div class="team-panel left" id="panelLeft">
    <div class="team-header">
      <select class="team-select" id="teamSelectLeft"><option value="">— SELECT TEAM —</option></select>
    </div>
    <div class="turn-labels">
      <div class="spacer">Item</div>
      <div class="turn-label">T1</div>
      <div class="turn-label">T2</div>
      <div class="turn-label">T3</div>
      <div class="turn-label">T4</div>
    </div>
    <div class="team-content" id="contentLeft"></div>
  </div>

  <!-- CENTER SCORING -->
  <div class="scoring-panel" id="scoringPanel">
    <div class="scoring-header">Scoring</div>
    <div class="scoring-list" id="scoringList"></div>
  </div>

  <!-- RIGHT TEAM (mirrored) -->
  <div class="team-panel right" id="panelRight">
    <div class="team-header">
      <select class="team-select" id="teamSelectRight"><option value="">— SELECT TEAM —</option></select>
    </div>
    <div class="turn-labels">
      <div class="spacer">Item</div>
      <div class="turn-label">T1</div>
      <div class="turn-label">T2</div>
      <div class="turn-label">T3</div>
      <div class="turn-label">T4</div>
    </div>
    <div class="team-content" id="contentRight"></div>
  </div>
</div>

<script>
let DATA = null;
let checkedLeft = {};
let checkedRight = {};

async function loadData() {
  DATA = {
  "teams": [
    "Angels of Death",
    "Battleclade",
    "Blades of Khaine",
    "Blooded",
    "Brood Brothers",

    "Pathfinders",
    "Phobos Strike Team",
    "Plague Marines",
    "Ratlings",
    "Raveners",
    "Sanctifiers",
    "Scout Squad",
    "Tempestus Aquilons",
    "Vespid Stingwings",
    "Void-Dancer Troupe",
    "Warpcoven",
    "Wolf Scouts",
    "Wrecka Krew",
    "Wyrmblade",
    "XV26 Stealth Battlesuits"
  ],
  "faction_rules": {
    "Angels of Death": [
      {
        "title": "CHAPTER TACTICS",
        "texts": [
          "ANGEL OF DEATH\nFACTION RULE\nCHAPTER TACTICS\nEach Space Marine Chapter is a martial brotherhood\nwith its own combat philosophies, suited to the unique\nskills and temperaments of its battle-brothers. These\ntenets of war may be clothed in esoteric rituals built up\nover thousands of years, but remain as brutally effective\nas when they were first laid down.\nWhen selecting your kill team, select a primary\nand secondary CHAPTER TACTIC for friendly\nANGEL OF DEATH  operatives to gain for the\nbattle. Multiple instances of the same CHAPTER\nTACTIC aren’t cumulative.\nDesigner’s Note: If you’re playing a series of\ngames, i.e. a campaign or tournament, you\nmust select the same primary and secondary\nCHAPTER TACTIC for every battle (you can\nstill change the secondary with the Adaptive\nTactics strategy ploy).\nCHAPTER TACTIC OPTIONS ARE PRESENTED ON\nTHEIR OWN CARD",
          "ANGEL OF DEATH\nFACTION RULE\nCHAPTER TACTICS\n1. AGGRESSIVE\nThis operative’s melee weapons have the\nRending weapon rule.\n2. DUELLER\nWhenever this operative is fighting or retaliating,\neach of your normal successes can block one\nunresolved critical success (unless the enemy\noperative’s weapon has the Brutal weapon rule).\n3. RESOLUTE\nYou can ignore any changes to this operative’s\nAPL stat and it isn’t affected by enemy\noperatives’ Shock weapon rule.\nCONTINUES ON OTHER SIDE"

      {
        "title": "ASTARTES",
        "texts": [
          "ANGEL OF DEATH\nFACTION RULE\nASTARTES\nThese genetically modified superhumans are made for\none purpose: war.\nDuring each friendly ANGEL OF DEATH\noperative’s activation, it can perform either two\nShoot actions or two Fight actions. If it’s two\nShoot actions, a bolt weapon must be selected\nfor at least one of them, and if it’s a bolt sniper\nrifle or heavy bolter, 1 additional AP must be\nspent for the second action if both actions are\nusing that weapon.\nEach friendly ANGEL OF DEATH  operative can\ncounteract regardless of its order."

      }
    ],
    "Battleclade": [
      {
        "title": "NOOSPHERIC NETWORK",
        "texts": [
          "BATTLECLADE\nFACTION RULE\nNOOSPHERIC NETWORK\nServitors are yoked to their Tech-Priest masters by\nan invisible web of control. This noospheric network\nenables servitors to be rapidly reorganised, transferring\nprocessing power to other thralls who might better serve\nthe Tech-Priests’ immediate wishes. While some are\nleft to conform to their basic programming, others are\ninstructed with key tasks that must be fulfilled for the\nglory of the Machine God.\nOnce during each friendly BATTLECLADE\nSERVITOR operative’s activation, before or after\nit performs an action, you can spend 1AP to\nTRANSFER POWER.\nAfter that activation, you can NETWORK\nCOUNTERACT with one other friendly\nBATTLECLADE  SERVITOR operative before your\nopponent activates. Whenever you NETWORK\nCOUNTERACT with a friendly operative, first\nselect its order. It can then perform a 1AP action\nfor free, but cannot move more than 2\" during\nthat action. Once it’s done so, your opponent\nthen activates as normal.\nCONTINUES ON OTHER SIDE"
        ]
      }
    ],
    "Blades of Khaine": [
      {
        "title": "ASPECT TECHNIQUES",
        "texts": [
          "BLADES OF KHAINE\nFACTION RULE\nASPECT TECHNIQUES\nAspect Warriors are trained in myriad killing techniques,\nparrying blows and acrobatic movements. These are as\nbreathtaking to behold as they are lethal to their foes.\nEach ASPECT TECHNIQUE is in a category: Dire\nAvenger, Howling Banshee and Striking Scorpion.\nEach ASPECT TECHNIQUE can only be used with\na friendly operative that has the matching Aspect\nkeyword, and each will specify when it can be\nused and what its effects are. In addition:\n•  You cannot use more than one ASPECT\nTECHNIQUE per activation or counteraction.\n•  You cannot use each ASPECT TECHNIQUE\nmore than once per turning point.\n•  If every friendly BLADES OF KHAINE  operative\nselected for deployment has the same Aspect\nkeyword (e.g. STRIKING SCORPION), you\ncannot use each ASPECT TECHNIQUE more\nthan twice per turning point (instead of once).\nASPECT TECHNIQUE OPTIONS ARE PRESENTED\nON THEIR OWN CARDS"
        ]
      },
      {
        "title": "HOWLING BANSHEE",
        "texts": [
          "BLADES OF KHAINE\nFACTION RULE\nHOWLING BANSHEE\nASPECT TECHNIQUE\nTHE WOE\nHowling Banshees are woe given form. Emitting sonic\nscreeches from their helms, they hurl themselves into\nthe stunned foe, the lightning speed of their swordplay\ncutting through the enemy before a blow can be landed\nin return.\nUse this ASPECT TECHNIQUE during a friendly\nHOWLING BANSHEE operative’s activation,\nafter it’s performed the Charge action and\nincapacitated an enemy operative during the\nFight action, and is no longer within control range\nof enemy operatives. That friendly operative can\nimmediately perform a free Charge action using\nany remaining move distance it had from that\nfirst Charge action. That operative can perform\ntwo Charge actions during its activation to do so.\nThe operative cannot have performed any other\nactions during this activation (but can do so after\nresolving this ASPECT TECHNIQUE).",
          "BLADES OF KHAINE\nFACTION RULE\nHOWLING BANSHEE\nASPECT TECHNIQUE\nRAIN OF TEARS\nHowling Banshees dive in and out of combat with\ninfuriating speed and agility, making it almost\nimpossible for those few who survive their most brutal\nattacks to strike in return.\nUse this ASPECT TECHNIQUE when a friendly\nHOWLING BANSHEE operative is fighting, after\nyou strike with a critical success, if the enemy\noperative isn’t incapacitated. End that sequence\n(any remaining attack dice are discarded) and\nimmediately perform a free Fall Back action\nup to 3\" with that operative (then the Fight\naction ends). That operative can do so even if\nit’s performed an action that prevents it from\nperforming the Fall Back action.",
          "BLADES OF KHAINE\nFACTION RULE\nHOWLING BANSHEE\nASPECT TECHNIQUE\nACROBATIC\nWhen Howling Banshees traverse the battlefield, little\nslows them down. With effortless grace they leap and\nflip over intervening obstacles, landing with peerless\npoise and balance to drive their blades into the foe.\nUse this ASPECT TECHNIQUE when a friendly\nHOWLING BANSHEE operative performs an action\nin which it moves. Until the end of the action,\nthat operative:\n•  Can ignore all vertical distances whenever it\ndrops and climbs.\n•  Can move through enemy operatives, move\nwithin control range of them, and during\nthe Charge action can leave their control\nrange (it must still end the move following all\nrequirements for that move).\n•  Cannot move more than its Move stat if it’s the\nCharge action.",
          "BLADES OF KHAINE\nFACTION RULE\nHOWLING BANSHEE\nASPECT TECHNIQUE\nSCREAM-THAT-STEALS\nAny hope the foe has of retaining the upper hand over a\nHowling Banshee is lost the moment the leaping Aspect\nWarrior activates their Banshee mask. Their senses\noverwhelmed, the enemy are all but helpless against the\nmerciless melee attacks that follow.\nUse this ASPECT TECHNIQUE when a friendly\nHOWLING BANSHEE operative is fighting or\nretaliating, at the start of the Resolve Attack\nDice step. You can resolve one of your successes\nbefore the normal order. If you do, that success\nmust be used to block.",
          "BLADES OF KHAINE\nFACTION RULE\nHOWLING BANSHEE\nASPECT TECHNIQUE\nSHRIEK-THAT-KILLS\nThose Howling Banshees who have learned how to focus\ntheir vocal chords correctly can emit a shriek so piercing\nand deafening that it can not only stun a foe, but liquefy\ntheir brain.\nUse this ASPECT TECHNIQUE when a friendly\nHOWLING BANSHEE operative is performing the\nShoot action. Until the end of that action, that\noperative can use the following ranged weapon:\nNAME\nATK HIT DMG\nShriek-that-kills\n5\n3+\n1/2\nWR\nRange 6\", Saturate, Seek Light, Stun, Torrent 1\""

      {
        "title": "DIRE AVENGER",
        "texts": [
          "BLADES OF KHAINE\nFACTION RULE\nDIRE AVENGER\nASPECT TECHNIQUE\nTHE SLICING HURRICANE\nTrained to embrace supreme tactical flexibility,\nDire Avengers are capable of unleashing clouds of\nrazor-sharp shuriken while moving to secure ground or\nslipping out of reach of the foe.\nUse this ASPECT TECHNIQUE when a friendly\nDIRE AVENGER operative is performing the\nReposition action. That operative can perform\nthe Shoot action during that action (it must do so\nin a location it can be placed, and any remaining\nmove distance it had from that Reposition action\ncan be used after it does so). You must select its\nshuriken catapult, shuriken pistol or twin shuriken\ncatapult for that Shoot action.",
          "BLADES OF KHAINE\nFACTION RULE\nDIRE AVENGER\nASPECT TECHNIQUE\nDEATH OF A THOUSAND BLADES\nDire Avengers can unleash great deluges of\nmonomolecular shuriken from their weapons. These\nlethal volleys echo the Death of a Thousand Blades –\nthe punishment that Khaine meted out upon traitors,\ncheats and others he deemed unworthy of a clean kill.\nUse this ASPECT TECHNIQUE when a friendly\nDIRE AVENGER operative is performing the\nShoot action and you select a shuriken catapult\nor twin shuriken catapult. Until the end of that\naction, that weapon has the Torrent 2\" weapon\nrule, but you cannot select more than one\nsecondary target.",
          "BLADES OF KHAINE\nFACTION RULE\nDIRE AVENGER\nASPECT TECHNIQUE\nVIGILANCE OF THE AVENGER\nThe noble warrior who is tasked with punishing the\nunjust and the criminal must be ever vigilant. Their eyes\nmust be keen and their aim must be true.\nUse this ASPECT TECHNIQUE when a friendly\nDIRE AVENGER operative is performing the Shoot\naction and you select a shuriken catapult or twin\nshuriken catapult. Until the end of that action,\nthat weapon has the Lethal 5+ weapon rule.",
          "BLADES OF KHAINE\nFACTION RULE\nDIRE AVENGER\nASPECT TECHNIQUE\nUNSTINTING, IMMOVABLE\nDire Avengers wear armour fashioned from\npsycho-sensitive thermoplas scales that are reactive\nto impact. When suffering a blow, the armour stiffens\nto spread the energy across the wearer. On top of this\nflexible suit, these Aspect Warriors wear bone-like\nplates over the most vulnerable areas of their body.\nUse this ASPECT TECHNIQUE when an operative\nis shooting a friendly DIRE AVENGER operative,\nand you’ve rolled two or more fails. You can\ndiscard one of them to retain the other as a\nnormal success instead.",
          "BLADES OF KHAINE\nFACTION RULE\nDIRE AVENGER\nASPECT TECHNIQUE\nRAGING HEAT OF THE DYING FLAME\nThe flames upon shrines of Asuryan possess a searing\nheat and never burn out, even if they dwindle. Thus\ndoes the Dire Avenger strive to imitate these flames,\nequally dangerous to the foe regardless of the injuries\nthey sustain.\nUse this ASPECT TECHNIQUE during a friendly\nDIRE AVENGER operative’s activation. Until the\nstart of that operative’s next activation, you can\nignore any changes to its stats from being injured\n(including its weapons’ stats)."
        ]

      {
        "title": "STRIKING SCORPION",
        "texts": [
          "BLADES OF KHAINE\nFACTION RULE\nSTRIKING SCORPION\nASPECT TECHNIQUE\nPATIENT STALK, SUDDEN BLOW\nCarefully concealed in cover or in shadows, Striking\nScorpions stalk their oblivious prey, manoeuvring\naround their targets in complete silence to select the\noptimum position to launch their killing strike.\nUse this ASPECT TECHNIQUE when a friendly\nSTRIKING SCORPION operative that has a\nConceal order performs the Reposition action.\nDuring that action, that operative can move\nwithin control range of enemy operatives (it\ncannot end the move there), and you can inflict\nD3+2 damage on one enemy operative it moved\nwithin control range of after it’s moved.",
          "BLADES OF KHAINE\nFACTION RULE\nSTRIKING SCORPION\nASPECT TECHNIQUE\nSTRIKE AND FADE\nMasters of the hit and run attack, Striking Scorpions\nwithdraw from combat as suddenly as they strike,\ndisappearing into shadow like murderous spirits.\nUse this ASPECT TECHNIQUE when a friendly\nSTRIKING SCORPION operative incapacitates\nan enemy operative while fighting or retaliating,\nand is no longer within 3\" of enemy operatives.\nChange that friendly operative’s order to Conceal\nand it can immediately perform a free Dash\naction, even if it’s performed an action that\nprevents it from performing the Dash action.",
          "BLADES OF KHAINE\nFACTION RULE\nSTRIKING SCORPION\nASPECT TECHNIQUE\nSCORPION’S EYE\nA Striking Scorpion’s shuriken pistol has a viewfinder\npsychically linked to its bearer. With it, the Aspect\nWarrior can see through multiple spectra as well as\nswiftly identify friend from foe.\nUse this ASPECT TECHNIQUE when a friendly\nSTRIKING SCORPION operative is performing the\nShoot action and you select a shuriken pistol.\nUntil the end of that action, that weapon has the\nSeek Light weapon rule.",
          "BLADES OF KHAINE\nFACTION RULE\nSTRIKING SCORPION\nASPECT TECHNIQUE\nMERCILESS STRIKES\nWhen Striking Scorpions launch their assault, they\nattack with relentless ferocity, landing blow after blow\nto grant the enemy no moment or reprieve.\nUse this ASPECT TECHNIQUE when a friendly\nSTRIKING SCORPION operative is fighting, the\nfirst time you strike with a critical success during\nthat sequence. Until the end of that sequence,\nthat operative’s melee weapon has the Shock\nweapon rule.",
          "BLADES OF KHAINE\nFACTION RULE\nSTRIKING SCORPION\nASPECT TECHNIQUE\nONE WITH THE GLOOM\nYears of strict training render Striking Scorpions capable\nof blending uncannily with the shadows, waiting for the\nperfect moment to attack their unsuspecting foes with\nterrifying accuracy.\nUse this ASPECT TECHNIQUE during a friendly\nSTRIKING SCORPION operative’s activation. Until\nthe start of its next activation, while that operative\nhas a Conceal order and is in cover, it cannot be\nselected as a valid target, taking precedence over\nall other rules (e.g. Seek, Vantage terrain) except\nbeing within 2\"."
        ]
      }

          "BROOD BROTHER\nFACTION RULE\nCROSSFIRE\nCombined with their advanced coordination skills, the\nprofessional training and high-grade weapons of Brood\nBrothers make them a deadly threat. With a sinister\nsynchronicity born of the alien Broodmind that worms\nthrough their psyche, these soldiers are capable of a\nconcentration of firepower or a harmonising of blows\nthat is ferociously effective.\nWhenever a friendly BROOD BROTHER  operative\nis shooting against or fighting against an enemy\noperative, after resolving all of your attack dice, if\nthat enemy operative isn’t incapacitated it gains\none of your Crossfire tokens.\nWhenever a friendly BROOD BROTHER  operative\nis shooting against, fighting against or retaliating\nagainst an enemy operative that has any of your\nCrossfire tokens, you can remove any of those\ntokens. For each that you do, you can re-roll one\nof your attack dice."

    "Canoptek Circle": [

        "title": "OBELISK NODE MATRIX",
        "texts": [
          "CANOPTEK CIRCLE\nFACTION RULE\nOBELISK NODE MATRIX\nObelisk nodes are concentrations of Necron technology,\nhubs of energy and data streams. Whether raised\nup from their sites of ancient burial, formed from\nrestructured local matter or phased into place from a\npocket dimension, these angular nodes can empower\na Cryptek and their servants. Impelled into positions\nwhere they can connect in a matrix of power, they aid\nthe Cryptek’s ambitions whilst hampering their foes.\nAs a STRATEGIC GAMBIT in the first turning point,\nplace your three OBELISK NODE markers wholly\nwithin your territory. As a STRATEGIC GAMBIT\nin each turning point after the first, you can\nmove each of your OBELISK NODE markers up to\n3\" horizontally.\nYour OBELISK NODE markers control other\nmarkers within 1\" of them that no enemy\noperatives contest (treat your OBELISK NODE\nmarkers as friendly operatives for this purpose).\nIf more than one player would use their OBELISK\nNODE markers to control the same marker, no\nOBELISK NODE markers control it.\nCONTINUES ON OTHER SIDE"

        "title": "ACCURSED GIFTS",
        "texts": [
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\nAccursed followers of Chaos are blessed by the gods\nwith a horrifying array of mutations. Chiropteran wings,\nrigid horns, wicked claws and dextrous tentacles: all of\nthese diabolical gifts are used to devastating effect.\nACCURSED GIFTS are rules that friendly CHAOS\nCULT  operatives gain when they turn into\nanother operative type (see Mutation faction\nrule). The first time a friendly DEVOTEE operative\nturns into a MUTANT operative during the battle,\nselect your primary ACCURSED GIFT. The first\ntime a friendly MUTANT operative turns into a\nTORMENT operative during the battle, select your\nsecondary ACCURSED GIFT.\nAll friendly MUTANT operatives have your primary\nACCURSED GIFT, and all friendly TORMENT\noperatives have your primary and secondary\nACCURSED GIFTS. You cannot select the same\nACCURSED GIFT more than once per battle.\nACCURSED GIFT OPTIONS ARE PRESENTED ON\nTHEIR OWN CARDS",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n1. Deformed Wings\nTattered, leathery wings burst from heaving folds of\nflesh. These infernal mutations allow their wretched\nbearer to ascend and drop into the fray with\nterrifying agility.\nWhenever this operative is climbing up, you can\ntreat the vertical distance as 2\" (regardless of\nhow far the operative actually moves vertically).\nWhenever this operative is dropping, ignore the\nvertical distance.",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n2. Fleet\nMuscular, misshapen limbs, undulating tentacles and\nslime-slick extrusions propel mutant Cultists across\nthe battlefield with a speed that is as shocking as it\nis horrific.\nAdd 1\" to this operative’s Move stat.",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n3. Chitinous\nHardened plates formed of chitinous, daemonic material\nerupt from angry, swollen flesh, lending the accursed\nunholy resilience and turning lasbolts, bullets and\nblades aside.\nImprove this operative’s Save stat by 1.",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n4. Horned\nPairs of sharp, curved horns protrude from the\nforeheads of some mutant Cultists, used to charge, gore\nand impale their victims.\nWhenever this operative ends its move during the\nCharge action, you can inflict 1 damage on one\nenemy operative within its control range, or D3\ndamage instead if this operative is a TORMENT.",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n5. Sinewed\nWithin this Cultist’s twisted form, hardened sinews and\ntendons bind muscle, lending monstrous strength to\neach and every strike they make.\nYou can ignore any changes to the Hit stat of this\noperative’s melee weapons from being injured.\nThis operative’s melee weapons have the Brutal\nweapon rule.",
          "CHAOS CULT\nFACTION RULE\nACCURSED GIFTS\n6. Barbed\nThis Cultist’s body and weapons are coated with sharp\nbarbs that bite into those nearby, ripping flesh and\nspilling blood.\nWhenever this operative is fighting or retaliating:\n• Enemy operatives cannot assist.\n•  The first time you strike during that sequence,\nalso inflict 1 damage on each other enemy\noperative within this operative’s control range,\nor D3 damage instead if this operative is a\nTORMENT (roll separately for each)."

    "Death Korps": [

        "title": "GUARDSMEN ORDERS",
        "texts": [
          "DEATH KORPS\nFACTION RULE\nGUARDSMEN ORDERS\nThe soldiers of the Death Korps of Krieg are\nunquestioningly loyal to their officers, following barked\norders with a speed and efficiency that is the envy of\nmany other regiments.\nSTRATEGIC GAMBIT and SUPPORT. A friendly\nDEATH KORPS  WATCHMASTER operative\ncan issue a GUARDSMAN ORDER. Whenever it\ndoes, select one GUARDSMAN ORDER for all\nfriendly DEATH KORPS  operatives within 6\" of it\nto receive.\nWhenever a friendly operative receives a\nGUARDSMAN ORDER, apply its rules until the end\nof the turning point. Operatives cannot benefit\nfrom more than one GUARDSMAN ORDER at\nonce; they only benefit from the most recent\norder they received during the turning point.\nGUARDSMEN ORDERS OPTIONS ARE\nPRESENTED ON THEIR OWN CARDS",
          "DEATH KORPS\nFACTION RULE\nGUARDSMEN ORDERS\nTake Aim!\nOutfitted and trained for attritional\ninfantry combat, the soldiers of Krieg\nhave undertaken endless hours of\nlasgun drills.\nRanged weapons of operatives that received\nthis order (excluding mortar barrage and remote\ndetonator) have the Ceaseless weapon rule.\nFix Bayonets!\nThe kind of warfare undertaken by\nthe Death Korps of Krieg requires\ntheir troopers to be well versed\nin close-quarters fighting and\ntrench clearance.\nMelee weapons of operatives that received this\norder have the Ceaseless weapon rule.",

        "title": "WARRANT OF TRADE",
        "texts": [
          "ELUCIDIAN STARSTRIDER\nFACTION RULE\nWARRANT OF TRADE\nThe writ of a Rogue Trader allows them incredible\naccess across the Imperium. With more flexibility than\nalmost any other agents of the Imperium, they barter,\nintimidate and 'borrow' to gain valuable resources\nthat allow them to enter any engagement with the\nupper hand.\nUp to four times per battle, you can use a\nWARRANT OF TRADE rule (below). Each one\nspecifies when it can be used, and you cannot\nuse the same WARRANT OF TRADE rule more\nthan once per battle.\nConsideration\nWhen: In the Select Operatives step, after\nrevealing your equipment options.\nEffect: Select one additional equipment option. It\ncannot be an option you have previously selected.\nCONTINUES ON OTHER SIDE"

          "ELUCIDIAN STARSTRIDER\nFACTION RULE\nPRIVATEER SUPPORT ASSETS\nThe Starstriders never stray too far from the New Dawn.\nOverhead, its massive batteries of ship-based artillery\nrain down on enemies, providing invaluable air support.\nOnce per Firefight phase, when a friendly\nELUCIDIAN STARSTRIDER  NAVIS or ELUCIDIAN\nSTARSTRIDER  ELUCIA VHANE operative\nperforms the Shoot action, you can select one\nof the following PRIVATEER SUPPORT ASSET\nranged weapons for it to use. You cannot use\neach PRIVATEER SUPPORT ASSET more than\nonce per battle.\nWhenever a friendly ELUCIDIAN STARSTRIDER\noperative is using a PRIVATEER SUPPORT ASSET,\ndetermine cover saves differently. Instead, the\ntarget has a cover save if any part of its base is\nunderneath Vantage terrain. Note that while this\ncan affect the target’s cover save, you must still\nselect a valid target as normal. In other words, the\nshot is guided by an operative in the killzone, but\nit comes from above.\nCONTINUES ON OTHER SIDE"

    "Exaction Squad": [
      {
        "title": "RUTHLESS EFFICIENCY",
        "texts": [
          "EXACTION SQUAD\nFACTION RULE\nRUTHLESS EFFICIENCY\nA target, whether marked to be apprehended or\neliminated, stands little chance of escaping the\nattention of an Adeptus Arbites Exaction Squad.\nWhenever a friendly EXACTION SQUAD\noperative is shooting (excluding with frag or krak\ngrenades) and you’re selecting a valid target, you\ncan use this rule. If you do, having other friendly\nEXACTION SQUAD  operatives within an enemy\noperative’s control range doesn’t prevent that\nenemy operative from being selected."
        ]
      },
      {
        "title": "MARKED FOR JUSTICE",
        "texts": [
          "EXACTION SQUAD\nFACTION RULE\nMARKED FOR JUSTICE\nExaction Squads prioritise their targets, focusing their\nire on those marked for immediate punishment before\nmoving on to the next transgressor.\nSTRATEGIC GAMBIT. Select one enemy operative\nto be your mark for the turning point. Whenever a\nfriendly EXACTION SQUAD  operative is shooting\nagainst, fighting against or retaliating against\nyour mark, that friendly operative's weapons\nhave the Punishing weapon rule. Whenever your\nmark is incapacitated, you can select a new\nenemy operative to be your mark for the turning\npoint (and can continue to do so during this\nturning point)."
        ]
      },
      {
        "title": "REPRESS",
        "texts": [
          "EXACTION SQUAD\nFACTION RULE\nREPRESS\nExperienced in suppressing riots, rebellions and various\nother kinds of unrest, the Adeptus Arbites are resilient\nin the face of any oncoming foe, no matter their origin.\nSome weapons in this team’s rules have the\nRepress weapon rule below.\n*Repress: Whenever this operative is using\nthis weapon:\n•  Each of your blocks can be allocated to block\ntwo unresolved successes (instead of one).\n•  If this operative is retaliating, you resolve\nthe first attack dice (i.e. defender instead\nof attacker)."
        ]
      }

    "Farstalker Kinband": [
      {
        "title": "FARSTALKER",
        "texts": [
          "FARSTALKER KINBAND\nFACTION RULE\nFARSTALKER\nFarstalker Kindbands move and fight instinctively,\nreacting to developing battlefield conditions with an\ninhuman speed of thought.\nIn the Ready step of each Strategy phase, you\ncan change the order of up to three friendly\nFARSTALKER KINBAND  operatives that are not\nwithin control range of enemy operatives.\nWhenever it’s your turn to counteract, you can\nchange the order of one friendly FARSTALKER\nKINBAND  operative that’s not within control\nrange of enemy operatives instead. This still\ncounts as you counteracting (so activation\nalternates back to your opponent afterwards),\nbut doesn’t count as that friendly operative’s\ncounteraction for this turning point."
        ]
      }
    ],
    "Fellgor Ravagers": [
      {
        "title": "FRENZY",
        "texts": [
          "FELLGOR RAVAGER\nFACTION RULE\nFRENZY\nFellgor Ravagers channel their pain into an animalistic\nfrenzy, dismissing wounds and bursting with aggression.\nWhenever a friendly FELLGOR RAVAGER\noperative that doesn’t have one of your Frenzy\ntokens would be incapacitated during the battle,\nit’s not incapacitated and it gains one of your\nFrenzy tokens. All remaining attack dice are\ndiscarded (including yours if this operative is\nfighting or retaliating). If it has a Conceal order,\nchange it to Engage.\nWhenever a friendly FELLGOR RAVAGER\noperative has one of your Frenzy tokens:\n•  It’s only incapacitated as detailed overleaf.\n•  It cannot have a Conceal order.\n•  It’s injured.\n•  It cannot perform the Pick Up Marker, unique\n(excluding Sweeping Blow, see VANDAL) or\nmission actions (excluding Operate Hatch).\n•  For the purpose of determining control of\nmarkers, treat its APL stat as 1. This takes\nprecedence over any stat changes.\nCONTINUES ON OTHER SIDE"
        ]
      }
    ],
    "Gellerpox Infected": [
      {
        "title": "TECHNO-CURSE",
        "texts": [
          "GELLERPOX INFECTED\nFACTION RULE\nTECHNO-CURSE\nThe Gellerpox is an insidious techno-curse that\nwends its way into cogitator systems and mechanical\ncomponents, spreading its dubious gifts to\nthe unsuspecting.\nAt the end of the Select Operatives step, select\none TECHNO-CURSE for friendly GELLERPOX\nINFECTED  operatives to gain for the battle.\nWhenever an enemy operative is within your\nselected TECHNO-CURSE’s infection range, that\nenemy operative is affected by the symptom of the\nselected TECHNO-CURSE. Each TECHNO-CURSE,\nits infection range and its symptom is listed below:\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "MUTOID VERMIN",
        "texts": [
          "GELLERPOX INFECTED\nFACTION RULE\nMUTOID VERMIN\nTiny pests become monstrous threats under the effects\nof the Gellerpox, but are still grubs that can be ignored\nby highly trained warriors.\nMUTOID VERMIN operatives cannot perform any\nactions other than Charge, Dash, Fall Back, Fight,\nReposition and Shoot, or use any weapons that\naren’t on their datacard. They can perform the\nFall Back action for 1 less AP.\nMUTOID VERMIN operatives cannot contest\nmarkers or areas of the killzone, and are ignored\nfor your opponent’s kill/elimination op (when\nthey're incapacitated, and when determining\nyour starting number of operatives). They're also\nignored for victory conditions and scoring VPs\nif either require operatives to ‘escape’, ‘survive’\nor be incapacitated by enemy operatives (if they\nescape/survive/are incapacitated, determining\nhow many operatives must escape/survive/be\nincapacitated, etc.).\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "NIGHTMARE HULKS",
        "texts": [
          "GELLERPOX INFECTED\nFACTION RULE\nNIGHTMARE HULKS\nSeveral among the infected have had their forms\nbloated and swollen into enormous twisted creatures,\nblessed with the bounteous gifts of Nurgle. Though\nmade powerful by such mutations, these monstrosities\nare somewhat clumsy in their movements.\nWhenever your opponent is selecting a valid\ntarget, friendly GELLERPOX INFECTED\nNIGHTMARE HULK operatives cannot use Light\nterrain for cover. While this can allow such\noperatives to be targeted (assuming they’re\nvisible), it doesn’t remove their cover save\n(if any).\nFriendly GELLERPOX INFECTED  NIGHTMARE\nHULK operatives cannot perform unique\nactions. You must spend 1 additional AP for\nfriendly GELLERPOX INFECTED  NIGHTMARE\nHULK operatives (excluding VULGRAR THRICE-\nCURSED) to perform the Pick Up Marker and\nmission actions (excluding Operate Hatch)."
        ]
      },
      {
        "title": "REVOLTINGLY RESILIENT",
        "texts": [
          "GELLERPOX INFECTED\nFACTION RULE\nREVOLTINGLY RESILIENT\nThe monstrous transformations wrought upon these\nhulking brutes have rendered their aberrant physiologies\nincredibly resistant to harm.\nWhenever an attack dice inflicts damage of 3\nor more on a friendly GELLERPOX INFECTED\nNIGHTMARE HULK or GELLERPOX INFECTED\nMUTANT operative, roll one D6: on a 4+, subtract\n1 from that inflicted damage."
        ]
      }
    ],
    "Goremongers": [
      {
        "title": "RUNES OF KHORNE",
        "texts": [
          "GOREMONGER\nFACTION RULE\nRUNES OF KHORNE\nKhornate runes carved into the flesh of Goremongers\ngive them an infernal resistance to ranged attacks.\nEach friendly GOREMONGER  operative cannot\nlose more than 8 wounds per Shoot action."
        ]
      },
      {
        "title": "GORE TANKS",
        "texts": [
          "GOREMONGER\nFACTION RULE\nGORE TANKS\nGoremongers’ tanks contain a concoction of stimms,\nrecombinant proteins and alchemical fuel. This cocktail\nenergises the carrier, but the tanks require a constant\nsupply of blood and gore for the infernal alchemy to\nfunction at peak efficiency.\nEach friendly GOREMONGER  operative has a\nGORE TANK that has three levels: full, half and\nempty. They start the battle at half. Whenever\na GORE TANK increases, it goes up one level;\nwhenever it decreases, it goes down one level.\nA GORE TANK cannot increase when it’s already\nfull, or decrease when it’s already empty (see\ndiagram on other side).\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "SANGUAVITAE",
        "texts": [
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nThe blood-infused concoction within the Goremongers’\ntanks is known as sanguavitae. Empowered by this fluid,\nthey can undertake gore-drenched deeds far beyond the\ncapabilities of most Humans. Through these acts they\nemulate Bloodletters and venerate Khorne.\nEach SANGUAVITAE rule specifies when it can\nbe used, and you must decrease the operative’s\nGORE TANK to do so. You cannot use the same\nSANGUAVITAE rule more than once per activation\nor counteraction, and you cannot use more\nthan two SANGUAVITAE rules per activation or\ncounteraction. You cannot use Mania and Fury\nduring the same activation.\nSANGUAVITAE RULES ARE PRESENTED ON\nTHEIR OWN CARDS",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nRejuvenate\nWHEN:\nDuring a friendly GOREMONGER\noperative’s activation or counteraction,\nbefore or after it performs an action.\nEFFECT:  That operative regains D3+1\nlost wounds.",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nMania\nWHEN:\nDuring a friendly GOREMONGER\noperative’s activation, before or after it\nperforms an action.\nEFFECT:  Until the start of that operative’s next\nactivation, add 1 to its APL stat.",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nFury\nWHEN:\nDuring a friendly GOREMONGER\noperative’s activation, before or after it\nperforms an action.\nEFFECT:  That operative can perform two Fight\nactions during that activation, and the\nsecond one is free.",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nRake\nWHEN:\nWhen a friendly GOREMONGER\noperative performs the Charge action\nduring its activation.\nEFFECT:  When that operative finishes moving\nduring that action, you can inflict D3\ndamage on one enemy operative within\nits control range.",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nSurge\nWHEN:\nWhen a friendly GOREMONGER\noperative performs the Charge or\nReposition action.\nEFFECT:  Until the end of that action, add 1\" to\nthat operative’s Move stat.",
          "GOREMONGER\nFACTION RULE\nSANGUAVITAE\nRage\nWHEN:\nWhen a friendly GOREMONGER\noperative performs the Fight action.\nEFFECT:  Until the end of that action, add 1\nto the Atk stat of that operative’s\nmelee weapons."
        ]
      }
    ],
    "Hand of the Archon": [
      {
        "title": "POWER FROM PAIN",
        "texts": [
          "HAND OF THE ARCHON\nFACTION RULE\nPOWER FROM PAIN\nThe Drukhari feed on the souls of their slain and\ntortured victims, drawing sustenance from the terrible\nagonies they inflict.\nAfter a friendly HAND OF THE ARCHON  operative\nperforms an action, it gains one of your Pain\ntokens if:\n•  An enemy operative was injured during that\naction, but was not incapacitated.\n•  An enemy operative was incapacitated during\nthat action. If that enemy operative had a\nWounds stat of 12 or more, that friendly\noperative gains two of your Pain tokens instead.\nYou can spend friendly operatives’ Pain tokens on\ninvigorations when the ‘when’ condition is met.\nYou cannot use more than one invigoration per\nactivation or counteraction, except Stimulated\nSenses, which can be used once per activation or\ncounteraction in addition to another invigoration.\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "RIFLES",
        "texts": [
          "HAND OF THE ARCHON\nFACTION RULE\nRIFLES\nThe long-barrelled splinter rifles carried by Kabalite\nWarriors are incredibly accurate in the hands of a\nskilled user.\nWhenever a friendly HAND OF THE ARCHON\noperative is shooting with a splinter rifle during\nan activation in which it hasn’t performed the\nCharge, Fall Back or Reposition action, that\nweapon has the Accurate 1 weapon rule. Note\nthat operative isn’t restricted from performing\nthose actions after shooting."
        ]
      }
    ],
    "Hearthkyn Salvagers": [
      {
        "title": "GRUDGE",
        "texts": [
          "HEARTHKYN SALVAGER\nFACTION RULE\nGRUDGE\nIf a particular foe shames or insults the Kin gravely\nenough, they will become the subject of a Grudge. To\ndestroy this most hated enemy, the Kin will go to any\nlengths, even if it is to their own detriment.\nWhenever an enemy operative incapacitates a\nfriendly HEARTHKYN SALVAGER  operative, that\nenemy operative gains one of your Grudge tokens\nfor the battle.\nWhenever a friendly HEARTHKYN SALVAGER\noperative is shooting against, fighting against or\nretaliating against an enemy operative, for each\nof your Grudge tokens that enemy operative has,\nyou can retain one of your normal successes as\na critical success instead (including any normal\nsuccesses already retained as a result of the\nAccurate weapon rule). Note that Grudge tokens\naren’t removed when you do this."
        ]
      }
    ],
    "Hernkyn Yaegirs": [
      {
        "title": "RESOURCEFUL",
        "texts": [
          "HERNKYN YAEGIR\nFACTION RULE\nRESOURCEFUL\nHernkyn Yaegirs are self-sufficiency specialists. They are\nalso skilled warriors who, usually unsupported, embark\nupon missions equipped for countless contingencies.\nThis allows them to adapt to hazardous environments\nand enemy actions with decisive speed.\nIn the Ready step of each Strategy phase after\nthe first, you gain Resourceful points determined\nby the number of friendly HERNKYN YAEGIR\noperatives in the killzone that aren’t within control\nrange of enemy operatives. At the end of each\nturning point, discard your Resourceful points.\nOPERATIVES\nRESOURCEFUL POINTS\n5+\n2\n1-4\n1\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "DAUNTLESS EXPLORERS",
        "texts": [
          "HERNKYN YAEGIR\nFACTION RULE\nDAUNTLESS EXPLORERS\nThe first of their kindred to set foot on new worlds,\nYaegirs are frequently deployed for extended periods\nand are experts in swiftly evaluating and exploiting their\narea of operations.\nSTRATEGIC GAMBIT in the first turning point.\nEach friendly HERNKYN YAEGIR  operative\nwholly within your drop zone can immediately\nperform a free Reposition action. Each that does\nso must end that move wholly within 4\" of your\ndrop zone."
        ]
      }

    "Hierotek Circle": [
      {
        "title": "REANIMATION PROTOCOLS",
        "texts": [
          "HIEROTEK CIRCLE\nFACTION RULE\nREANIMATION PROTOCOLS\nThe body of a slain Necron becomes wreathed in an\neerie glow. Severed limbs reattach and broken bodies\nreform in a shower of emerald sparks. Eye-lenses flicker\nonce more and the Necron rises again to rejoin the fight.\nThe first time each friendly HIEROTEK CIRCLE\noperative is incapacitated, before it's removed\nfrom the killzone, place one of your Reanimation\nmarkers within its control range. Then remove\nit as incapacitated, also removing any tokens\nand rules effects it had (e.g. CHRONOMANCER\noperative’s Chronometron action, Poison tokens,\nAPL stat changes, being implanted, etc.).\nIn the Ready step of each Strategy phase, select\none of your Reanimation markers and roll one D6:\non a 1-2, leave that Reanimation marker in the\nkillzone and repeat this process with a different\none of your Reanimation markers (if any); on a\n3+, an operative is REANIMATED.\nCONTINUES ON OTHER SIDE"
        ]
      },
      {
        "title": "MAGNIFY",
        "texts": [
          "HIEROTEK CIRCLE\nFACTION RULE\nMAGNIFY\nNecron Crypteks may impose their will over their thralls\nand underlings, projecting their consciousness into\nthese lesser beings in order to enhance their combat\nability and ensure the obliteration of the enemy.\nSome HIEROTEK CIRCLE  APPRENTEK and\nHIEROTEK CIRCLE  CRYPTEK weapons in this\nteam’s rules have the Magnify weapon rule below.\n*Magnify: Whenever this operative is performing\nthe Shoot action with this weapon, if the target\nis visible to this operative, and another friendly\nHIEROTEK CIRCLE  APPRENTEK or HIEROTEK\nCIRCLE  CRYPTEK operative that has an Engage\norder and isn’t within control range of enemy\noperatives is visible to this operative, you can\nuse this rule. If you do, treat that operative as the\nactive operative for the purposes of determining\na valid target, cover and obscured. If you do, this\nweapon has the Ceaseless weapon rule until the\nend of that action."

        "texts": [
          "HIEROTEK CIRCLE\nFACTION RULE\nLIVING METAL\nThe Necrons’ semi-sentient metal skin enables them to\nheal devastating damage in the midst of battle.\nIn the Ready step of each Strategy phase,\nafter resolving all other rules in this step (e.g.\nReanimation Protocols faction rule), each friendly\nHIEROTEK CIRCLE  operative regains up to D3+1\nlost wounds (roll separately for each)."
        ]
      }

    "Hunter Clade": [
      {
        "title": "DOCTRINA IMPERATIVES",
        "texts": [
          "HUNTER CLADE\nFACTION RULE\nDOCTRINA IMPERATIVES\nTech-Priests dictate protocols for the Hunter Clade to\nfollow as they move through their mission, straining\nthe programming of the Skitarii and Sicarians in order\nto optimise their current status, to the detriment of\nall else.\nAt the end of the Select Operatives step, select\none DOCTRINA IMPERATIVE to be a Primary\nMode for your kill team until the end of the\nbattle (note that selecting a Primary Mode\ndoesn’t automatically give you the effects of that\nDOCTRINA IMPERATIVE for the battle; you must\nstill select it as a STRATEGIC GAMBIT, as below).\nSTRATEGIC GAMBIT. Select one DOCTRINA\nIMPERATIVE for friendly HUNTER CLADE\noperatives to have until the Ready step of the next\nStrategy phase. Each DOCTRINA IMPERATIVE\nhas both an Optimisation and a Deprecation rule.\nBoth are in effect while your kill team has that\nDOCTRINA IMPERATIVE. Once per battle, when\nyou select the DOCTRINA IMPERATIVE that’s\nyour kill team’s Primary Mode, you can ignore its\nDeprecation rule."

      }

    "Imperial Navy Breachers": [
      {
        "title": "VOID ARMOUR",
        "texts": [
          "IMPERIAL NAVY BREACHER\nFACTION RULE\nVOID ARMOUR\nThe armour worn by Imperial Navy Armsmen\nis void-sealed, meaning that they can fight in\nenvironments devoid of gravity or atmosphere. Such\narmour also serves to protect them from explosive\nblasts and flaming torrents.\nWhenever an operative is shooting a friendly\nIMPERIAL NAVY BREACHER  operative, if the\nranged weapon in that sequence has the Blast\nor Torrent weapon rule (excluding weapons that\nhave a sweeping profile), you can re-roll one of\nyour defence dice, or up to two of your defence\ndice if that friendly operative is a GRENADIER.\nFriendly IMPERIAL NAVY BREACHER  operatives\naren’t affected by the x\" Devastating x weapon\nrule (i.e. Devastating with a distance) unless they\nare the target during that sequence."

      {
        "title": "BREACH AND CLEAR",
        "texts": [
          "IMPERIAL NAVY BREACHER\nFACTION RULE\nBREACH AND CLEAR\nMethodical, professional and well-drilled, Imperial\nNavy Breachers work as a unit to breach and clear the\ncorridors and chambers of enemy voidcraft, space\nhulks, orbital stations and more.\nOnce per turning point, when a ready friendly\nIMPERIAL NAVY BREACHER  operative is\nactivated, you can use this rule. If you do,\nselect one other ready friendly IMPERIAL NAVY\nBREACHER  operative visible to and within 3\" of\nthat operative. When that first friendly operative\nis expended, you can activate that other friendly\noperative before your opponent activates. When\nthat other operative is expended, your opponent\nthen activates as normal."
        ]
      }

    "Inquisitorial Agents": [

        "title": "INQUISITORIAL REQUISITION",
        "texts": [
          "INQUISITORIAL AGENT\nFACTION RULE\nINQUISITORIAL REQUISITION\nFew authorities in the Imperium have greater\njurisdiction than the Inquisition. An Inquisitor can, on\na whim, requisition forces from virtually any of the\nImperium’s military branches.\nREQUISITIONED operatives can be taken from\none of the following groups to supplement an\nINQUISITORIAL AGENT  kill team, as specified in\nthis kill team’s selection rules:\n• DEATH KORPS\n• EXACTION SQUAD\n• IMPERIAL NAVY BREACHER\n• KASRKIN\n• SISTER OF SILENCE\n• TEMPESTUS SCION\nCONTINUES ON OTHER SIDE"
        ]
      }
    ],
    "Kasrkin": [
      {
        "title": "SKILL AT ARMS",
        "texts": [
          "KASRKIN\nFACTION RULE\nSKILL AT ARMS\nThe Kasrkin go where they are needed. Battle-hardened,\nuncompromising and equipped with the best weapons\navailable, these elites pursue their objectives\nwith professionalism, hard-won experience and\nrigid determination.\nSTRATEGIC GAMBIT. Select a SKILL AT ARMS for\nfriendly KASRKIN  operatives to have until the\nReady step of the next Strategy phase.\nSKILL AT ARMS OPTIONS ARE PRESENTED ON\nTHEIR OWN CARDS",
          "KASRKIN\nFACTION RULE\nSKILL AT ARMS\nLight ’Em Up\nEstablishing overlapping fields of fire as they advance,\nthe Kasrkin react to any enemy movement with a lethal\nvolley of fire.\nFriendly KASRKIN  operatives’ ranged weapons\nhave the Severe weapon rule.",
          "KASRKIN\nFACTION RULE\nSKILL AT ARMS\nStrike Fast\nKasrkin pride themselves upon their physical fitness\nand can cover ground swiftly, even when carrying heavy\ncombat gear.\nWhenever a friendly KASRKIN  operative is\nperforming the Reposition action, add 1\" to its\nMove stat.",
          "KASRKIN\nFACTION RULE\nSKILL AT ARMS\nIce In Your Veins\nAll Cadians are subjected to a lifetime of war. Those\nchosen to join the ranks of the elite Kasrkin are amongst\nthe hardiest.\nWhenever a friendly KASRKIN  operative is\nfighting or retaliating, or an operative is shooting\nit, the first time an attack dice inflicts Normal\nDmg of 3 or more on this operative during that\nsequence, that dice inflicts 1 less damage on it.",
          "KASRKIN\nFACTION RULE\nSKILL AT ARMS\nFor Cadia!\nAll Kasrkin strive to uphold the honour of their\ndead homeworld.\nAdd 1 to the Atk stat of friendly KASRKIN\noperatives’ melee weapons (to a maximum of\n4). Whenever a friendly KASRKIN  operative\nis fighting, the first time you strike during that\nsequence, inflict 1 additional damage."
        ]
      },
      {
        "title": "RAPID FIRE",
        "texts": [
          "KASRKIN\nFACTION RULE\nRAPID FIRE\nRuthlessly drilled and murderously efficient, Kasrkin lay\ndown hails of high-powered fire against the foe.\nEach friendly KASRKIN  operative that doesn’t\nperform an action in which it moves during\nits activation can perform two Shoot actions\n(excluding Guard) during that activation, but a\nbolt pistol, hot-shot lasgun or hot-shot laspistol\nmust be selected for both of those actions."
        ]
      }
    ],
    "Kommandos": [
      {
        "title": "THROAT SLITTAS",
        "texts": [
          "KOMMANDO\nFACTION RULE\nTHROAT SLITTAS\nUnusual amongst Orks, Kommandos utilise stealth and\nmisdirection to close in before falling upon the enemy\nwith jagged blades drawn.\nEach friendly KOMMANDO  operative (excluding\nBOMB SQUIG) can perform the Charge action\nwhile it has a Conceal order."
        ]
      }

    "Legionaries": [
      {
        "title": "MARKS OF CHAOS",
        "texts": [
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nBy making dark pacts with the Ruinous Powers,\nLegionaries may increase their own might. Yet such\nbargains rarely come without a cost.\nWhenever you select a LEGIONARY  operative for\nthe battle, you must select one of the following\nkeywords for it to have for that battle: KHORNE,\nNURGLE, SLAANESH, TZEENTCH, UNDIVIDED.\nEach operative’s keyword can be different, but\na BALEFIRE ACOLYTE operative cannot have the\nKHORNE keyword.\nFriendly LEGIONARY  operatives have an\nadditional rule determined by this keyword. In\naddition, LEGIONARY  ploys have additional\nbenefits for operatives with the relevant keyword.\nMARK OF CHAOS OPTIONS ARE PRESENTED ON\nTHEIR OWN CARDS",
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nKHORNE\nWrathful Onslaught\nThis operative’s melee weapons have the Severe\nweapon rule.",
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nNURGLE\nDisgusting Vigour\nWhenever Normal Dmg of 3 or more is inflicted\non this operative, roll one D6: on a 5+, subtract 1\nfrom that inflicted damage.",
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nSLAANESH\nUnnatural Agility\nAdd 1\" to this operative’s Move stat.",
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nTZEENTCH\nEmpyreal Guidance\nThis operative’s ranged weapons have the Severe\nweapon rule.",
          "LEGIONARY\nFACTION RULE\nMARKS OF CHAOS\nUNDIVIDED\nVicious Reavers\nWhenever this operative is shooting against,\nfighting against or retaliating against an enemy\noperative within 6\" of it, this operative’s weapons\nhave the Ceaseless weapon rule."

      {
        "title": "ASTARTES",
        "texts": [
          "LEGIONARY\nFACTION RULE\nASTARTES\nThese genetically modified superhumans are made for\none purpose: war.\nDuring each friendly LEGIONARY  operative’s\nactivation, it can perform either two Shoot\nactions or two Fight actions. If it’s two Shoot\nactions, a bolt pistol, boltgun or tainted bolt pistol\nmust be selected for at least one of them.\nEach friendly LEGIONARY  operative can\ncounteract regardless of its order."
        ]
      }

    "Mandrakes": [
      {
        "title": "SOULSTRIKE",
        "texts": [
          "MANDRAKE\nFACTION RULE\nSOULSTRIKE\nThe balefire hurled by the Mandrakes burns cold and\nfierce, fed by the tinder of their victim’s life force and\nanimus. Conventional armour offers little protection\nagainst this insidious force.\nSome weapons in this team’s rules have the\nSoulstrike weapon rule below.\n*Soulstrike: Successful defence dice are\ndetermined differently. Each result that’s equal\nto or less than the target’s APL stat is a success\nand is retained. Each result that’s higher than the\ntarget’s APL stat is a fail and is discarded. Each\nresult of 1 is always a critical success. Each other\nsuccess is a normal success. Each result of 6 is\nalways a fail.\nDesigner’s Note: Many of this kill team’s rules\nrefer to an enemy operative’s APL stat. This would\nbe the APL stat at the time the rule takes effect\n(i.e. including changes)."
        ]
      },
      {

var SCORE_ROWS = ['Command Points', 'Crit Op', 'Tac Op', 'Kill Op'];
var PRIMARY_OPS = ['Crit Op', 'Tac Op', 'Kill Op'];

function populateTeams() {
  ['teamSelectLeft', 'teamSelectRight'].forEach(function(id) {
    var sel = document.getElementById(id);
    DATA.teams.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      sel.appendChild(opt);
    });
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function makeSelect(max) {
  var html = '<select class="score-input">';
  for (var i = 0; i <= max; i++) {
    html += '<option value="' + i + '">' + i + '</option>';
  }
  html += '</select>';
  return html;
}

function updateTotals() {
  var leftTotal = 0, rightTotal = 0;
  var list = document.getElementById('scoringList');
  list.querySelectorAll('.score-input').forEach(function(el) {
    var val = parseInt(el.value) || 0;
    if (el.closest('.total-vp')) return;
    if (el.dataset.row === 'Command Points') return;
    var side = el.dataset.side;
    if (side === 'left') leftTotal += val;
    else if (side === 'right') rightTotal += val;
    else leftTotal += val;
  });
  // Add primary op values
  list.querySelectorAll('.primary-value').forEach(function(el) {
    var val = parseInt(el.textContent) || 0;
    var side = el.dataset.side;
    if (side === 'left') leftTotal += val;
    else if (side === 'right') rightTotal += val;
    else leftTotal += val;
  });
  var leftEl = document.getElementById('totalLeft');
  var rightEl = document.getElementById('totalRight');
  if (leftEl) leftEl.textContent = leftTotal;
  if (rightEl) rightEl.textContent = rightTotal;
}

function updatePrimaryOp(side) {
  var list = document.getElementById('scoringList');
  var checked = list.querySelector('input.primary-radio[data-side="' + side + '"]:checked');
  var display = list.querySelector('.primary-value[data-side="' + side + '"]');
  if (!display) return;
  if (!checked) { display.textContent = '0'; updateTotals(); return; }
  var row = checked.dataset.row;
  var sel = list.querySelector('select.score-input[data-side="' + side + '"][data-row="' + row + '"]');
  var val = sel ? parseInt(sel.value) || 0 : 0;
  display.textContent = Math.ceil(val / 2);
  updateTotals();
}

function renderScoring() {
  var list = document.getElementById('scoringList');
  list.innerHTML = '';
  var leftTeam = document.getElementById('teamSelectLeft').value;
  var rightTeam = document.getElementById('teamSelectRight').value;
  var twoTeams = leftTeam && rightTeam;

  SCORE_ROWS.forEach(function(label) {
    var item = document.createElement('div');
    var hasPrimaryRadio = PRIMARY_OPS.indexOf(label) >= 0;
    item.className = 'score-item' + (hasPrimaryRadio ? ' has-radio' : '');

    var labelHtml = '<div class="score-item-label">';
    if (hasPrimaryRadio && twoTeams) {
      labelHtml += '<input type="radio" name="primaryLeft" class="primary-radio" data-side="left" data-row="' + label + '">';
    }
    labelHtml += escapeHtml(label);
    if (hasPrimaryRadio && twoTeams) {
      labelHtml += '<input type="radio" name="primaryRight" class="primary-radio" data-side="right" data-row="' + label + '">';
    } else if (hasPrimaryRadio) {
      labelHtml += '<input type="radio" name="primaryLeft" class="primary-radio" data-side="left" data-row="' + label + '">';
    }
    labelHtml += '</div>';
    item.innerHTML = labelHtml;

    var inputs = document.createElement('div');
    inputs.className = 'score-inputs';

    if (twoTeams) {
      inputs.innerHTML = makeSelect(6).replace('class="score-input"', 'class="score-input" data-side="left" data-row="' + label + '"') +
        makeSelect(6).replace('class="score-input"', 'class="score-input" data-side="right" data-row="' + label + '"');
    } else {
      inputs.innerHTML = makeSelect(6).replace('class="score-input"', 'class="score-input" data-side="left" data-row="' + label + '"');
    }

    item.appendChild(inputs);
    list.appendChild(item);
  });

  // Primary Op row (auto-calculated)
  var primaryItem = document.createElement('div');
  primaryItem.className = 'score-item';
  primaryItem.innerHTML = '<div class="score-item-label">Primary Op</div>';
  var primaryInputs = document.createElement('div');
  primaryInputs.className = 'score-inputs';
  if (twoTeams) {
    primaryInputs.innerHTML = '<div class="primary-value" data-side="left">0</div><div class="primary-value" data-side="right">0</div>';
  } else {
    primaryInputs.innerHTML = '<div class="primary-value" data-side="left">0</div>';
  }
  primaryItem.appendChild(primaryInputs);
  list.appendChild(primaryItem);

  // Total VP row
  var totalItem = document.createElement('div');
  totalItem.className = 'total-vp';
  var totalVals = '<div class="total-vp-label">Total VP</div><div class="total-vp-values">';
  if (twoTeams) {
    totalVals += '<div class="total-vp-num" id="totalLeft">0</div><div class="total-vp-num" id="totalRight">0</div>';
  } else {
    totalVals += '<div class="total-vp-num" id="totalLeft">0</div>';
  }
  totalVals += '</div>';
  totalItem.innerHTML = totalVals;
  list.appendChild(totalItem);

  // Wire up events
  list.querySelectorAll('.score-input').forEach(function(el) {
    el.addEventListener('change', function() {
      var side = el.dataset.side;
      updatePrimaryOp(side);
      updateTotals();
    });
  });
  list.querySelectorAll('.primary-radio').forEach(function(el) {
    el.addEventListener('change', function() {
      updatePrimaryOp(el.dataset.side);
    });
  });
}

var universalEquip = [
  { title: 'KRAK AND FRAG GRENADES', texts: [] },
  { title: 'SMOKE AND STUN GRENADES', texts: [] },
];

function renderPanel(side) {
  var selId = side === 'left' ? 'teamSelectLeft' : 'teamSelectRight';
  var contentId = side === 'left' ? 'contentLeft' : 'contentRight';
  var checkedObj = side === 'left' ? checkedLeft : checkedRight;
  var team = document.getElementById(selId).value;
  var panel = document.getElementById(contentId);
  panel.innerHTML = '';

  // Clear checked state for this side
  if (side === 'left') { checkedLeft = {}; } else { checkedRight = {}; }
  checkedObj = side === 'left' ? checkedLeft : checkedRight;

  if (!team) {
    panel.innerHTML = '<div class="empty-hint" style="padding:30px">Select a team</div>';
    return;
  }

  var sections = [
    { key: 'faction_rules', label: 'Faction Rules', cls: 'faction-rule', startCollapsed: true },
    { key: 'strategy_ploys', label: 'Strategy Ploys', cls: 'strategy', startCollapsed: false },
    { key: 'firefight_ploys', label: 'Firefight Ploys', cls: 'firefight', startCollapsed: false },
    { key: 'equipment', label: 'Equipment', cls: 'equipment', startCollapsed: false },
  ];

  sections.forEach(function(sec) {
    var items = (DATA[sec.key] && DATA[sec.key][team]) || [];
    if (sec.key === 'equipment') {
      items = universalEquip.concat(items);
    }

    var header = document.createElement('div');
    header.className = 'section-header' + (sec.startCollapsed ? ' collapsed' : '');
    header.innerHTML = '<span class="chevron">\u25BC</span> ' + escapeHtml(sec.label) +
      ' <span style="margin-left:auto;font-size:0.6rem;color:var(--muted)">' + items.length + '</span>';
    header.addEventListener('click', function() { header.classList.toggle('collapsed'); });
    panel.appendChild(header);

    var body = document.createElement('div');
    body.className = 'section-body';

    if (items.length === 0) {
      body.innerHTML = '<div class="empty-hint" style="padding:10px">No items</div>';
    }

    items.forEach(function(item, idx) {
      var row = document.createElement('div');
      row.className = 'item';

      var detailText = item.texts.map(function(t) { return escapeHtml(t); }).join('\n\n---\n\n');

      var info = document.createElement('div');
      info.className = 'item-info';

      var infoHtml = '<div class="item-info-text">' +
        '<div class="item-title">' + escapeHtml(item.title) + '</div>' +
        '<div class="item-type">' + escapeHtml(sec.label) + '</div>' +
        '</div>';

      // Equipment items get a remove button
      if (sec.key === 'equipment') {
        infoHtml += '<button class="remove-btn" title="Remove">\u2715</button>';
      }

      info.innerHTML = infoHtml +
        '<div class="item-detail">' + (detailText || '<em>No text available</em>') + '</div>';

      info.querySelector('.item-info-text').addEventListener('click', function() { row.classList.toggle('expanded'); });

      // Wire up remove button for equipment
      var removeBtn = info.querySelector('.remove-btn');
      if (removeBtn) {
        removeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          row.classList.add('removed');
          // Clear any checked states for this item
          for (var t = 1; t <= 4; t++) {
            var key = side + '|' + sec.key + '|' + idx + '|' + t;
            delete checkedObj[key];
          }
        });
      }

      row.appendChild(info);

      var turns = document.createElement('div');
      turns.className = 'item-turns';

      var isOnceAGame = sec.key === 'equipment' && item.onceAGame;
      var isTwiceAGame = sec.key === 'equipment' && item.title === 'SAINTLY RELICS';
      var turnList = isOnceAGame ? [1] : isTwiceAGame ? [1, 2] : [1, 2, 3, 4];

      turnList.forEach(function(turn) {
        (function(turn) {
          var chk = document.createElement('div');
          chk.className = 'turn-check';
          chk.dataset.turn = turn;
          chk.title = isOnceAGame ? 'Once a game' : isTwiceAGame ? 'Use ' + turn : 'Turn ' + turn;
          chk.addEventListener('click', function(e) {
            e.stopPropagation();
            var key = side + '|' + sec.key + '|' + idx + '|' + turn;
            if (checkedObj[key]) {
              delete checkedObj[key];
              chk.classList.remove('active');
            } else {
              checkedObj[key] = { title: item.title, cls: sec.cls, label: sec.label };
              chk.classList.add('active');
            }
          });
          turns.appendChild(chk);
        })(turn);
      });

      row.appendChild(turns);
      body.appendChild(row);
    });

    panel.appendChild(body);
  });
}

document.getElementById('teamSelectLeft').addEventListener('change', function() {
  renderPanel('left');
  renderScoring();
});

document.getElementById('teamSelectRight').addEventListener('change', function() {
  renderPanel('right');
  renderScoring();
  updatePanelVisibility();
});

function updatePanelVisibility() {
  var rightTeam = document.getElementById('teamSelectRight').value;
  var vis = rightTeam ? '' : 'none';
  document.querySelector('#panelRight .turn-labels').style.display = vis;
  document.getElementById('contentRight').style.display = vis;
}

document.getElementById('resetBtn').addEventListener('click', function() {
  checkedLeft = {};
  checkedRight = {};
  document.querySelectorAll('.turn-check.active').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.score-input').forEach(function(el) { el.value = '0'; });
  document.querySelectorAll('.primary-radio').forEach(function(el) { el.checked = false; });
  document.querySelectorAll('.primary-value').forEach(function(el) { el.textContent = '0'; });
  document.querySelectorAll('.total-vp-num').forEach(function(el) { el.textContent = '0'; });
  document.querySelectorAll('.item.removed').forEach(function(el) { el.classList.remove('removed'); });
});

renderPanel('left');
renderPanel('right');
updatePanelVisibility();
loadData();
</script>
</body>
</html>
